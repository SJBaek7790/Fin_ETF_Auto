name: ETF Monitoring (Daily)

on:
  schedule:
    # Weekday 10:00 AM KST = Weekday 1:00 AM UTC
    - cron: '0 1 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Clone KIS SDK
        run: |
          git clone --depth 1 https://github.com/koreainvestment/open-trading-api.git /tmp/kis-sdk

      - name: Run ETF Monitoring
        env:
          PYTHONPATH: /tmp/kis-sdk/examples_user:/tmp/kis-sdk/examples_user/domestic_stock
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_CANO: ${{ secrets.KIS_CANO }}
          KIS_ACNT_PRDT_CD: ${{ secrets.KIS_ACNT_PRDT_CD }}
          KIS_MODE: ${{ secrets.KIS_MODE }}
        run: python etf_monitoring.py

      - name: Commit and push portfolio state
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/*.json
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update portfolio state [skip ci]"
            git push
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-logs
          path: logs/
          if-no-files-found: ignore
          retention-days: 30
