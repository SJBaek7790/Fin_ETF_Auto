name: ETF Screening (Weekly)

on:
  schedule:
    # Friday 2:00 PM KST = Friday 5:00 AM UTC
    - cron: '0 5 * * 5'
  workflow_dispatch:

jobs:
  screen:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Clone KIS SDK
        run: |
          git clone --depth 1 https://github.com/koreainvestment/open-trading-api.git /tmp/kis-sdk

      - name: Run ETF Screening
        env:
          PYTHONPATH: /tmp/kis-sdk/examples_user:/tmp/kis-sdk/examples_user/domestic_stock
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_CANO: ${{ secrets.KIS_CANO }}
          KIS_ACNT_PRDT_CD: ${{ secrets.KIS_ACNT_PRDT_CD }}
          KIS_MODE: ${{ secrets.KIS_MODE }}
        run: python etf_screening.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screening-logs
          path: logs/
          retention-days: 30
